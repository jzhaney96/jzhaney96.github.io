  <h1>Delivery Orders</h1>
  <p>Get your favorite island dishes delivered to your door.</p>

<section class="delivery-form">
  <form>
    <input type="text" placeholder="Full Name" required>
    <input type="text" placeholder="Delivery Address" required>
    <input type="tel" placeholder="Phone Number" required>

    <select required>
      <option value="">Select Meal</option>
      <option>Jerk Chicken</option>
      <option>Conch Fritters</option>
      <option>Rum Cake</option>
      <option>Doubles</option>
      <option>Red Snapper</option>
      <option>Oxtail</option>
      <option>Piña Colada</option>
    </select>

    <textarea placeholder="Special Instructions"></textarea>
    <button type="submit">Place Order</button>
  </form>
</section>
